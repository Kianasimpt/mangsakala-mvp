<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mangsakala — Pranata Mangsa</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { height: 100%; }
  body {
    background: radial-gradient(ellipse at top, #2a1f15 0%, #160e08 80%);
    display: grid;
    place-items: center;
    padding: 24px;
    overflow: auto;
    scrollbar-width: none;
  }
  body::-webkit-scrollbar { display: none; }
  .stage {
    width: 402px;
    height: 874px;
    flex-shrink: 0;
  }
  .device-screen {
    position: absolute;
    inset: 0;
    border-radius: 48px;
    overflow: hidden;
  }
  .device-screen .screen {
    padding-top: 60px; /* clear the dynamic island / status bar */
    padding-bottom: 34px; /* clear home indicator */
  }
  @keyframes _ms-spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div id="root" class="stage"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" data-presets="react">
    // mount the inner App into IOSDevice
    const { useState } = React;

    // ====== DATA ======
    /* ── API connection ── */
    const API_BASE = window.API_BASE || "http://localhost:8000/api";
    const _IDM = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
    const _IDM_FULL = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
    const _MUSIM = {1:"Mareng",2:"Mareng",3:"Mareng",4:"Labuh",5:"Labuh",6:"Labuh",7:"Rendheng",8:"Rendheng",9:"Rendheng",10:"Mareng",11:"Mareng",12:"Mareng"};
    function _fd(s) { const p = s.split("-"); return `${parseInt(p[2])} ${_IDM[parseInt(p[1])-1]}`; }
    let _plant = { startDay: 28, startMo: "Oktober", endDay: 14, endMo: "November", days: 18 };

    let MANGSA = [
      { n: 1,  name: "Kasa",      tradisional: "22 Jun – 1 Agu",  adaptif: "18 Jun – 28 Jul",  geser: -4,  musim: "Mareng" },
      { n: 2,  name: "Karo",      tradisional: "2 Agu – 24 Agu",  adaptif: "29 Jul – 21 Agu",  geser: -3,  musim: "Mareng" },
      { n: 3,  name: "Katelu",    tradisional: "25 Agu – 17 Sep", adaptif: "22 Agu – 13 Sep",  geser: -4,  musim: "Mareng" },
      { n: 4,  name: "Kapat",     tradisional: "18 Sep – 12 Okt", adaptif: "14 Sep – 9 Okt",   geser: -4,  musim: "Labuh" },
      { n: 5,  name: "Kalima",    tradisional: "13 Okt – 8 Nov",  adaptif: "10 Okt – 4 Nov",   geser: -4,  musim: "Labuh" },
      { n: 6,  name: "Kanem",     tradisional: "9 Nov – 21 Des",  adaptif: "5 Nov – 16 Des",   geser: -5,  musim: "Labuh" },
      { n: 7,  name: "Kapitu",    tradisional: "22 Des – 2 Feb",  adaptif: "17 Des – 28 Jan",  geser: -5,  musim: "Rendheng" },
      { n: 8,  name: "Kawolu",    tradisional: "3 Feb – 28 Feb",  adaptif: "29 Jan – 23 Feb",  geser: -5,  musim: "Rendheng" },
      { n: 9,  name: "Kasanga",   tradisional: "1 Mar – 25 Mar",  adaptif: "24 Feb – 20 Mar",  geser: -5,  musim: "Rendheng" },
      { n: 10, name: "Kasadasa",  tradisional: "26 Mar – 18 Apr", adaptif: "21 Mar – 13 Apr",  geser: -5,  musim: "Mareng" },
      { n: 11, name: "Desta",     tradisional: "19 Apr – 11 Mei", adaptif: "14 Apr – 6 Mei",   geser: -5,  musim: "Mareng" },
      { n: 12, name: "Sadha",     tradisional: "12 Mei – 21 Jun", adaptif: "7 Mei – 17 Jun",   geser: -5,  musim: "Mareng" },
    ];
    let ACTIVE_MANGSA = 5;
    const REGIONS = [
      { label: "Kebumen, Jateng", available: true },
      { label: "Sleman, DIY",       available: false },
      { label: "Klaten, Jateng",    available: false },
      { label: "Bantul, DIY",       available: false },
      { label: "Magelang, Jateng",  available: false },
      { label: "Karanganyar, Jateng", available: false },
    ];
    const ROMAN = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"];

    // ====== ICONS ======
    const Ic = {
      Pin: (p) => (
        <svg viewBox="0 0 24 24" width={p.s||18} height={p.s||18} fill="none" stroke={p.c||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
        </svg>
      ),
      Chev: (p) => (
        <svg viewBox="0 0 24 24" width={p.s||16} height={p.s||16} fill="none" stroke={p.c||"currentColor"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transform: p.up ? "rotate(180deg)" : "none", transition: "transform .2s"}}>
          <path d="M6 9l6 6 6-6"/>
        </svg>
      ),
      Bell: (p) => (
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke={p.c||"#F5E6D3"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
        </svg>
      ),
      Cal: (p) => (
        <svg viewBox="0 0 32 32" width="30" height="30" fill="none" stroke={p.c||"#F5E6D3"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <rect x="4" y="6" width="24" height="22" rx="2.5"/><path d="M4 12h24"/><path d="M10 3v6M22 3v6"/>
          <circle cx="11" cy="18" r="1.2" fill={p.c||"#F5E6D3"}/><circle cx="16" cy="18" r="1.2" fill={p.c||"#F5E6D3"}/>
          <circle cx="21" cy="18" r="1.2" fill={p.c||"#F5E6D3"}/><circle cx="11" cy="23" r="1.2" fill={p.c||"#F5E6D3"}/><circle cx="16" cy="23" r="1.2" fill={p.c||"#F5E6D3"}/>
        </svg>
      ),
      Arr: (p) => (
        <svg viewBox="0 0 24 24" width={p.s||22} height={p.s||22} fill="none" stroke={p.c||"#F5E6D3"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      ),
      ArrL: (p) => (
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      ),
      Check: (p) => (
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke={p.c||"#C8553D"} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      ),
    };

    // ====== HEADER ======
    function Header({ region, setRegion, regionOpen, setRegionOpen }) {
      return (
        <div className="header">
          <div className="header-row">
            <div className="brand">
              <div className="brand-mark">
                <svg viewBox="0 0 32 32" width="26" height="26">
                  <ellipse cx="16" cy="10" rx="4.5" ry="7" fill="#F5E6D3"/>
                  <ellipse cx="11" cy="18" rx="4.5" ry="7" transform="rotate(-25 11 18)" fill="#F5E6D3" opacity="0.85"/>
                  <ellipse cx="21" cy="18" rx="4.5" ry="7" transform="rotate(25 21 18)" fill="#F5E6D3" opacity="0.85"/>
                  <path d="M16 24 L16 30" stroke="#F5E6D3" strokeWidth="1.6" strokeLinecap="round"/>
                </svg>
              </div>
              <div className="brand-text">
                <div className="brand-name">Mangsakala</div>
                <div className="brand-sub">Pranata Mangsa Adaptif</div>
              </div>
            </div>
            <button className="bell" aria-label="Notifikasi"><Ic.Bell /><span className="bell-dot"/></button>
          </div>

          <button className="region-pill" onClick={() => setRegionOpen(!regionOpen)}>
            <Ic.Pin c="#3E2F1C"/>
            <span className="region-label">Wilayah</span>
            <span className="region-value">{region}</span>
            <Ic.Chev c="#3E2F1C" up={regionOpen}/>
          </button>

          {regionOpen && (
            <div className="region-menu">
              {REGIONS.map(r => (
                <button key={r.label}
                  className={"region-item " + (r.label === region ? "is-active" : "")}
                  style={r.available ? {} : {opacity:0.5,cursor:"default"}}
                  onClick={() => { if (r.available) { setRegion(r.label); setRegionOpen(false); } }}>
                  <span>{r.label}</span>
                  {r.label === region && <Ic.Check/>}
                  {!r.available && <span style={{fontSize:10,color:"#8A7657",marginLeft:"auto",flexShrink:0}}>Segera hadir</span>}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ====== HERO ======
    function HeroCard() {
      return (
        <div
          className="hero-card hero-card-click"
          onClick={() => window.location.href = "Mangsakala-Almanac.html"}
          onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") window.location.href = "Mangsakala-Almanac.html"; }}
          role="button"
          tabIndex="0"
        >
          <div className="hero-top">
            <div className="hero-icon"><Ic.Cal/></div>
            <div className="hero-titles">
              <div className="hero-eyebrow">Rekomendasi untuk Anda</div>
              <div className="hero-title">Jendela Tanam Padi</div>
            </div>
            <div className="confidence">
              <span className="conf-dot"/>
              <span className="conf-label">Tinggi</span>
            </div>
          </div>

          <div className="hero-dates">
            <div className="date-block">
              <div className="date-mini">Mulai</div>
              <div className="date-day">{_plant.startDay}</div>
              <div className="date-mo">{_plant.startMo}</div>
            </div>
            <div className="hero-arrow"><Ic.Arr/></div>
            <div className="date-block">
              <div className="date-mini">Sampai</div>
              <div className="date-day">{_plant.endDay}</div>
              <div className="date-mo">{_plant.endMo}</div>
            </div>
          </div>

          <div className="hero-foot">
            <div className="foot-stat">
              <div className="foot-num">{_plant.days}</div>
              <div className="foot-lbl">hari</div>
            </div>
            <div className="foot-divider"/>
            <div className="foot-text">
              Curah hujan stabil, tanah lembab.<br/>
              Cocok semai benih varietas Ciherang.
            </div>
          </div>
        </div>
      );
    }

    // ====== MANGSA CARD ======
    function MangsaCard({ m, isActive }) {
      const geserText = m.geser === 0 ? "tepat" : `${m.geser > 0 ? "+" : ""}${m.geser} hari`;
      return (
        <div className={"mc " + (isActive ? "mc-active" : "")} data-screen-label={`Mangsa ${m.n} ${m.name}`}>
          {isActive && <div className="mc-now">DETIK INI</div>}
          <div className="mc-top">
            <div className="mc-num">{ROMAN[m.n - 1]}</div>
            <div className="mc-musim">{m.musim}</div>
          </div>
          <div className="mc-name">{m.name}</div>
          <div className="mc-rows">
            <div className="mc-row">
              <div className="mc-row-lbl">Tradisional</div>
              <div className="mc-row-val">{m.tradisional}</div>
            </div>
            <div className="mc-row">
              <div className="mc-row-lbl">Adaptif</div>
              <div className="mc-row-val mc-row-val--em">{m.adaptif}</div>
            </div>
          </div>
          <div className="mc-shift"><Ic.ArrL/><span>{geserText}</span></div>
        </div>
      );
    }

    // ====== APP NAV ======
    function AppNav() {
      const items = [
        { key: "ringkas", lbl: "Ringkas", href: "Mangsakala.html", svg: <><path d="M4 13h6V4H4z"/><path d="M14 20h6V4h-6z"/><path d="M4 20h6v-3H4z"/></> },
        { key: "mangsa", lbl: "Mangsa", href: "Mangsakala-Almanac.html", svg: <><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></> },
        { key: "iklim", lbl: "Iklim", href: "Mangsakala-Drift.html", svg: <><path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/></> },
        { key: "alert", lbl: "Waspada", href: "Mangsakala-Alert.html", svg: <><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/></> },
      ];
      return (
        <div className="app-tabbar">
          {items.map(it => (
            <button
              key={it.key}
              className={"app-tab " + (it.key === "ringkas" ? "is-active" : "")}
              onClick={() => { if (it.key !== "ringkas") window.location.href = it.href; }}
            >
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round">{it.svg}</svg>
              <span>{it.lbl}</span>
            </button>
          ))}
        </div>
      );
    }

    // ====== APP ======
    function App() {
      const [region, setRegion] = useState("Kebumen, Jateng");
      const [regionOpen, setRegionOpen] = useState(false);
      const [_apiVer, _setApiVer] = React.useState(0);
      const [_loading, _setLoading] = React.useState(true);
      const [_offline, _setOffline] = React.useState(false);
      React.useEffect(() => {
        fetch(`${API_BASE}/calendar?year=${new Date().getFullYear()}&region=kebumen`)
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(data => {
            const mapped = data.all_mangsa.map(m => ({
              n: m.number, name: m.name,
              tradisional: `${_fd(m.traditional_start)} – ${_fd(m.traditional_end)}`,
              adaptif: `${_fd(m.adaptive_start)} – ${_fd(m.adaptive_end)}`,
              geser: m.shift_days,
              musim: _MUSIM[m.number] || "Labuh",
            }));
            MANGSA.length = 0;
            MANGSA.push(...mapped);
            ACTIVE_MANGSA = data.current_mangsa.number;
            const pw = data.recommended_planting.primary_window;
            const s = pw.start.split("-"), e = pw.end.split("-");
            const d1 = new Date(pw.start), d2 = new Date(pw.end);
            _plant = { startDay: parseInt(s[2]), startMo: _IDM_FULL[parseInt(s[1])-1], endDay: parseInt(e[2]), endMo: _IDM_FULL[parseInt(e[1])-1], days: Math.round((d2-d1)/86400000)+1 };
            _setLoading(false);
            _setApiVer(v => v + 1);
          })
          .catch(() => { _setLoading(false); _setOffline(true); });
      }, []);

      return (
        <div className="screen" data-screen-label="Beranda Mangsakala">
          {_loading && <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(250,241,226,0.88)",zIndex:200,borderRadius:"inherit"}}><div style={{width:36,height:36,border:"3px solid #E5D2B3",borderTopColor:"#C8553D",borderRadius:"50%",animation:"_ms-spin 0.75s linear infinite"}}/></div>}
          {_offline && <div style={{position:"absolute",bottom:80,left:12,right:12,background:"#2A1F12",color:"#F5E6D3",borderRadius:10,padding:"10px 14px",fontSize:12,display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:300,boxShadow:"0 4px 16px rgba(0,0,0,0.4)"}}>
            <span>Data lokal ditampilkan — backend tidak terjangkau</span>
            <button onClick={() => _setOffline(false)} style={{background:"none",border:"none",color:"#C8553D",fontSize:16,cursor:"pointer",lineHeight:1}}>×</button>
          </div>}
          <Header region={region} setRegion={setRegion} regionOpen={regionOpen} setRegionOpen={setRegionOpen}/>
          <div className="body">
            <HeroCard/>
            <div className="section-head">
              <div className="section-title">12 Mangsa Tahun Ini</div>
              <div className="section-sub">Ketuk untuk detail</div>
            </div>
            <div className="grid">
              {MANGSA.map(m => <MangsaCard key={m.n} m={m} isActive={m.n === ACTIVE_MANGSA}/>)}
            </div>
            <div className="legend">
              <div className="legend-row">
                <span className="legend-sw legend-sw--trad"/>
                <span>Tanggal warisan, tetap dari leluhur</span>
              </div>
              <div className="legend-row">
                <span className="legend-sw legend-sw--ada"/>
                <span>Tanggal adaptif, sesuai iklim kini</span>
              </div>
            </div>
            <div className="footer-spacer"/>
          </div>
          <AppNav/>
        </div>
      );
    }

    function Mounted() {
      return (
        <IOSDevice width={402} height={874}>
          <App/>
        </IOSDevice>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Mounted/>);
  </script>
</body>
</html>
