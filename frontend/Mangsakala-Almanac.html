<body>
  <div id="root" class="stage"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "locationQuery": "",
      "forceNoResults": false,
      "mapsOffline": false,
      "distanceKm": 4,
      "rainTone": "normal",
      "autoOpenLocation": false,
      "activeMangsa": 5,
      "activeDay": 16
    }/*EDITMODE-END*/;

    let MANGSA = [
      { n: 1,  name: "Kasa",      tradisional: "22 Jun - 1 Agu",  adaptif: "18 Jun - 28 Jul",  geser: -4,  musim: "Mareng",   tanda: "Daun jatuh, tanah retak" },
      { n: 2,  name: "Karo",      tradisional: "2 Agu - 24 Agu",  adaptif: "29 Jul - 21 Agu",  geser: -3,  musim: "Mareng",   tanda: "Pohon randu berbuah" },
      { n: 3,  name: "Katelu",    tradisional: "25 Agu - 17 Sep", adaptif: "22 Agu - 13 Sep",  geser: -4,  musim: "Mareng",   tanda: "Umbi mulai tumbuh" },
      { n: 4,  name: "Kapat",     tradisional: "18 Sep - 12 Okt", adaptif: "14 Sep - 9 Okt",   geser: -4,  musim: "Labuh",    tanda: "Burung kembali bersarang" },
      { n: 5,  name: "Kalima",    tradisional: "13 Okt - 8 Nov",  adaptif: "10 Okt - 4 Nov",   geser: -4,  musim: "Labuh",    tanda: "Hujan pertama turun" },
      { n: 6,  name: "Kanem",     tradisional: "9 Nov - 21 Des",  adaptif: "5 Nov - 16 Des",   geser: -5,  musim: "Labuh",    tanda: "Buah-buahan matang" },
      { n: 7,  name: "Kapitu",    tradisional: "22 Des - 2 Feb",  adaptif: "17 Des - 28 Jan",  geser: -5,  musim: "Rendheng", tanda: "Hujan deras, banjir" },
      { n: 8,  name: "Kawolu",    tradisional: "3 Feb - 28 Feb",  adaptif: "29 Jan - 23 Feb",  geser: -5,  musim: "Rendheng", tanda: "Padi bunting" },
      { n: 9,  name: "Kasanga",   tradisional: "1 Mar - 25 Mar",  adaptif: "24 Feb - 20 Mar",  geser: -5,  musim: "Rendheng", tanda: "Padi menguning" },
      { n: 10, name: "Kasadasa",  tradisional: "26 Mar - 18 Apr", adaptif: "21 Mar - 13 Apr",  geser: -5,  musim: "Mareng",   tanda: "Burung bersarang" },
      { n: 11, name: "Desta",     tradisional: "19 Apr - 11 Mei", adaptif: "14 Apr - 6 Mei",   geser: -5,  musim: "Mareng",   tanda: "Lebah berkumpul" },
      { n: 12, name: "Sadha",     tradisional: "12 Mei - 21 Jun", adaptif: "7 Mei - 17 Jun",   geser: -5,  musim: "Mareng",   tanda: "Air mulai surut" },
    ];
    const ACTIVE = 5;
    const ROMAN = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"];
    /* MANGSA_THEME + MangsaOrnament come from mangsa-shared.jsx */

    /* ── API connection ── */
    const API_BASE = window.API_BASE || "http://localhost:8000/api";
    const _IDM = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
    const _MUSIM = {1:"Mareng",2:"Mareng",3:"Mareng",4:"Labuh",5:"Labuh",6:"Labuh",7:"Rendheng",8:"Rendheng",9:"Rendheng",10:"Mareng",11:"Mareng",12:"Mareng"};
    function _fd(s) { const p = s.split("-"); return `${parseInt(p[2])} ${_IDM[parseInt(p[1])-1]}`; }
    const _ENSO_LBL = {"el_nino_weak":"El Nino Lemah","el_nino_moderate":"El Nino Moderat","el_nino_strong":"El Nino Kuat","la_nina_weak":"La Nina Lemah","la_nina_moderate":"La Nina Moderat","la_nina_strong":"La Nina Kuat","neutral":"Netral"};

    let _notifPadi    = { window: "28 Okt - 14 Nov", days: 7,  note: "Siapkan persemaian dan cek air irigasi." };
    let _notifJagung  = { window: "3 Nov - 18 Nov",  days: 12, note: "Cocok setelah hujan awal stabil." };
    let _notifCabai   = { window: "24 Okt - 6 Nov",  days: 3,  note: "Perlu bedengan kering dan drainase baik." };
    let _notifKedelai = { window: "18 Nov - 2 Des",  days: 21, note: "Masih cukup waktu untuk persiapan benih." };
    let _notifEnso = { title: "ENSO · Memuat data...", body: "Menghubungi server untuk data iklim terkini." };

    /* tiny seeded sparkline values per mangsa (drift trend) */
    const SPARKS = {
      1: [-2,1,0,3,-1,2,4,2,3], 2: [0,-1,2,1,3,2,4,3,5], 3: [-1,1,0,2,4,3,5,4,6],
      4: [1,2,4,3,5,4,6,5,7], 5: [3,5,4,7,6,9,8,11,12], 6: [2,4,3,6,5,8,7,10,11],
      7: [4,3,6,5,8,7,10,9,12], 8: [3,5,4,7,6,9,8,11,10], 9: [2,4,3,6,5,8,7,10,11],
      10: [1,3,2,5,4,7,6,9,10], 11: [0,2,1,4,3,6,5,8,9], 12: [-1,1,0,3,2,5,4,7,8],
    };

    function Sparkline({ data, isActive }) {
      const w = 96, h = 22;
      const min = Math.min(...data, -2), max = Math.max(...data, 2);
      const sx = i => (i / (data.length - 1)) * w;
      const sy = v => h - ((v - min) / (max - min || 1)) * h;
      const baselineY = sy(0);
      const path = data.map((v,i) => `${i===0?"M":"L"}${sx(i).toFixed(1)},${sy(v).toFixed(1)}`).join(" ");
      return (
        <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
          <line className="baseline" x1="0" y1={baselineY} x2={w} y2={baselineY}
                stroke={isActive ? "rgba(245,230,211,0.35)" : "#E8D5B7"} strokeWidth="1" strokeDasharray="2 2"/>
          <path d={path} fill="none"
                stroke={isActive ? "#F5E6D3" : "#C8553D"}
                strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
          <circle cx={sx(data.length-1)} cy={sy(data[data.length-1])} r="2.2"
                  fill={isActive ? "#F5E6D3" : "#C8553D"}/>
        </svg>
      );
    }

    /* ===== ICONS ===== */
    const Bell = () => (
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#F5E6D3" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
        <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
      </svg>
    );
    const Pin = () => (
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#F5E6D3" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
      </svg>
    );
    const Sun = () => (
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#E8B98C" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="4" fill="#E8B98C" stroke="none"/>
        <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
    );
    const Drop = () => (
      <svg viewBox="0 0 24 24" width="14" height="14" fill="#7AA8D9" stroke="#7AA8D9" strokeWidth="1.6" strokeLinejoin="round">
        <path d="M12 2.5C12 2.5 5 10.5 5 15a7 7 0 0 0 14 0c0-4.5-7-12.5-7-12.5z"/>
      </svg>
    );
    const Wind = () => (
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#E8B98C" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 8h12a3 3 0 1 0-3-3M3 14h17a3 3 0 1 1-3 3M3 11h7"/>
      </svg>
    );
    const Sprout = () => (
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#F5E6D3" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M7 20h10"/>
        <path d="M12 20V10"/>
        <path d="M12 10C12 6 9 4 5 5c-1 4 2 6 7 5z"/>
        <path d="M12 12c0-3 2-5 5-4 1 3-2 5-5 4z"/>
      </svg>
    );
    const ArrR = () => (
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    );
    const ArrL = () => (
      <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    );

    /* ===== Wheel ===== */
    function MangsaWheel({ active }) {
      const cx = 55, cy = 55, r = 44, rIn = 32;
      const slice = 2 * Math.PI / 12;
      const wedges = MANGSA.map((m, i) => {
        const a0 = -Math.PI/2 + i * slice - slice/2;
        const a1 = -Math.PI/2 + i * slice + slice/2;
        const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
        const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
        const x0i = cx + rIn * Math.cos(a0), y0i = cy + rIn * Math.sin(a0);
        const x1i = cx + rIn * Math.cos(a1), y1i = cy + rIn * Math.sin(a1);
        const path = `M${x0},${y0} A${r},${r} 0 0 1 ${x1},${y1} L${x1i},${y1i} A${rIn},${rIn} 0 0 0 ${x0i},${y0i} Z`;
        const isActive = m.n === active;
        return (
          <path key={m.n} d={path}
                fill={isActive ? "#F5E6D3" : "rgba(245,230,211,0.10)"}
                stroke="rgba(245,230,211,0.18)" strokeWidth="0.5"/>
        );
      });
      // tick marks for each mangsa
      const ticks = MANGSA.map((m, i) => {
        const a = -Math.PI/2 + i * slice;
        const x = cx + (r+3) * Math.cos(a), y = cy + (r+3) * Math.sin(a);
        return <circle key={m.n} cx={x} cy={y} r="1" fill="rgba(245,230,211,0.5)"/>;
      });
      return (
        <svg viewBox="0 0 110 110" width="110" height="110">
          {wedges}
          {ticks}
          <circle cx={cx} cy={cy} r={rIn-2} fill="rgba(0,0,0,0.18)"/>
          <text x={cx} y={cy-3} textAnchor="middle" fontSize="9" fontWeight="700"
                fill="rgba(245,230,211,0.7)" letterSpacing="1">MANGSA</text>
          <text x={cx} y={cy+12} textAnchor="middle" fontFamily="Bricolage Grotesque, serif"
                fontSize="20" fontWeight="700" fill="#F5E6D3">{ROMAN[active-1]}</text>
        </svg>
      );
    }

    const _storedName = () => localStorage.getItem("mangsakala_user_name") || "Pak Wahyudi";

    /* ===== TopBar ===== */
    function TopBar({ onNotifOpen, onLocationOpen, hasNotif, region }) {
      const [userName, setUserName] = React.useState(_storedName);
      return (
        <div className="tb">
          <svg className="tb-stars" viewBox="0 0 360 80" preserveAspectRatio="none">
            <circle cx="40" cy="20" r="0.7" fill="#F5E6D3"/>
            <circle cx="120" cy="40" r="0.5" fill="#F5E6D3"/>
            <circle cx="220" cy="15" r="0.6" fill="#F5E6D3"/>
            <circle cx="290" cy="45" r="0.5" fill="#F5E6D3"/>
            <circle cx="330" cy="22" r="0.7" fill="#F5E6D3"/>
            <circle cx="80" cy="60" r="0.4" fill="#F5E6D3"/>
            <circle cx="180" cy="65" r="0.5" fill="#F5E6D3"/>
          </svg>
          <div className="tb-row">
            <div className="tb-greet">
              <div className="tb-hello">{new Date().getHours() < 12 ? "Sugeng enjing," : new Date().getHours() < 18 ? "Sugeng siang," : "Sugeng dalu,"}</div>
              <div className="tb-name" title="Ketuk untuk ganti nama" style={{cursor:"pointer"}} onClick={() => { const n = prompt("Nama Anda:", userName); if (n && n.trim()) { localStorage.setItem("mangsakala_user_name", n.trim()); setUserName(n.trim()); } }}><b>{userName}</b></div>
            </div>
            <div className="tb-actions">
              <button className="tb-btn" aria-label="Lokasi" onClick={onLocationOpen}><Pin/></button>
              <button className="tb-btn" aria-label="Notifikasi" onClick={onNotifOpen}>
                <Bell/>
                {hasNotif && <span className="tb-bdot"/>}
              </button>
            </div>
          </div>
          <div className="tb-strip">
            <div className="tb-strip-cell tb-strip-main">
              <span className="tb-strip-lbl">Suhu hari ini</span>
              <span className="tb-strip-val tb-weather-temp"><Sun/><span className="deg">28°C</span></span>
              <span className="tb-strip-note">Cerah</span>
            </div>
            <div className="tb-strip-cell">
              <span className="tb-strip-lbl">Hujan</span>
              <span className="tb-strip-val"><Drop/><span className="em">12 mm</span></span>
              <span className="tb-strip-note">7 hari</span>
            </div>
            <div className="tb-strip-cell">
              <span className="tb-strip-lbl">Angin</span>
              <span className="tb-strip-val"><Wind/>8 km/j</span>
              <span className="tb-strip-note">stabil</span>
            </div>
          </div>
        </div>
      );
    }

    function NotificationCenter({ open, onClose, crop, setCrop }) {
      const [tab, setTab] = useState("notif");
      const [reminderOn, setReminderOn] = useState(true);
      const crops = [
        { key: "padi", name: "Padi", window: _notifPadi.window, days: _notifPadi.days, note: _notifPadi.note, tone: "terra" },
        { key: "jagung",  name: "Jagung",  window: _notifJagung.window,  days: _notifJagung.days,  note: _notifJagung.note,  tone: "olive" },
        { key: "cabai",   name: "Cabai",   window: _notifCabai.window,   days: _notifCabai.days,   note: _notifCabai.note,   tone: "amber" },
        { key: "kedelai", name: "Kedelai", window: _notifKedelai.window, days: _notifKedelai.days, note: _notifKedelai.note, tone: "blue"  },
      ];
      const selected = crops.find(c => c.key === crop) || crops[0];
      const dueSoon = selected.days <= 7;
      const notifications = [
        {
          title: dueSoon ? `${selected.name} masuk jendela tanam seminggu lagi` : `${selected.name} belum mendesak`,
          body: dueSoon ? `${selected.window}. ${selected.note}` : `Jendela ${selected.window}. Sistem akan mengingatkan 7 hari sebelumnya.`,
          tag: dueSoon ? "Prioritas" : "Pantau",
        },
        { title: "Kalima sedang berlangsung", body: "Mangsa aktif cocok untuk mulai membaca tanda hujan awal.", tag: "Mangsa" },
        { title: _notifEnso.title, body: _notifEnso.body, tag: "Iklim" },
      ];
      if (!open) return null;
      return (
        <div className="notif-back" onClick={onClose}>
          <div className="notif-sheet" onClick={e => e.stopPropagation()}>
            <div className="notif-grab"/>
            <div className="notif-head">
              <div>
                <div className="notif-eyebrow">Pusat Notifikasi</div>
                <div className="notif-title">Pengingat Tanam</div>
              </div>
              <button className="notif-close" onClick={onClose} aria-label="Tutup">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
              </button>
            </div>

            <div className="notif-tabs">
              <button className={tab === "notif" ? "is-on" : ""} onClick={() => setTab("notif")}>Notifikasi</button>
              <button className={tab === "pref" ? "is-on" : ""} onClick={() => setTab("pref")}>Preferensi</button>
            </div>

            {tab === "notif" ? (
              <div className="notif-list">
                <div className={"notif-hero " + (dueSoon ? "is-hot" : "")}>
                  <div className="notif-bell-mini"><Bell/></div>
                  <div>
                    <div className="notif-hero-title">{dueSoon ? "Seminggu lagi siap tanam" : "Pengingat sudah aktif"}</div>
                    <div className="notif-hero-sub">{selected.name} - {selected.window}</div>
                  </div>
                  <div className="notif-days">{selected.days} hari</div>
                </div>
                {notifications.map((n, i) => (
                  <div className="notif-item" key={n.title} style={{animationDelay: `${120 + i * 70}ms`}}>
                    <div className="notif-dot"/>
                    <div className="notif-copy">
                      <div className="notif-item-top">
                        <b>{n.title}</b>
                        <span>{n.tag}</span>
                      </div>
                      <p>{n.body}</p>
                    </div>
                  </div>
                ))}
              </div>
            ) : (
              <div className="pref-pane">
                <div className="pref-summary">
                  <div>
                    <div className="pref-label">Tanaman pilihan</div>
                    <div className="pref-name">{selected.name}</div>
                  </div>
                  <button className={"pref-toggle " + (reminderOn ? "is-on" : "")} onClick={() => setReminderOn(!reminderOn)}>
                    <span/>
                  </button>
                </div>
                <div className="crop-grid">
                  {crops.map(c => (
                    <button key={c.key} className={"crop-card crop-" + c.tone + (crop === c.key ? " is-on" : "")} onClick={() => setCrop(c.key)}>
                      <span className="crop-name">{c.name}</span>
                      <span className="crop-window">{c.window}</span>
                      <span className="crop-days">{c.days} hari lagi</span>
                    </button>
                  ))}
                </div>
                <div className="pref-note">
                  {reminderOn ? "Notifikasi akan muncul otomatis saat jendela tanam tinggal 7 hari." : "Pengingat dimatikan, sistem hanya menyimpan preferensi tanaman."}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function LocationPanel({ open, onClose, region, setRegion, tweaks, setTweak }) {
      const [query, setQuery] = useState("");
      const regions = [
        { name: "Kebumen, Jateng",    coord: "-7.6686, 109.6526", rain: "7 mm",  status: "Data real · ML aktif",       map: [24, 58], available: true },
        { name: "Sleman, DIY",        coord: "-7.7325, 110.4024", rain: "—",     status: "Segera hadir",                map: [50, 42], available: false },
        { name: "Bantul, DIY",        coord: "-7.8754, 110.3250", rain: "—",     status: "Segera hadir",                map: [44, 63], available: false },
        { name: "Klaten, Jateng",     coord: "-7.7059, 110.6066", rain: "—",     status: "Segera hadir",                map: [67, 45], available: false },
        { name: "Magelang, Jateng",   coord: "-7.4797, 110.2177", rain: "—",     status: "Segera hadir",                map: [36, 30], available: false },
        { name: "Karanganyar, Jateng",coord: "-7.5961, 110.9508", rain: "—",     status: "Segera hadir",                map: [77, 36], available: false },
      ];
      const effectiveQuery = query || tweaks.locationQuery || "";
      const filtered = tweaks.forceNoResults ? [] : regions.filter(r => r.name.toLowerCase().includes(effectiveQuery.toLowerCase()));
      const active = (effectiveQuery && filtered[0]) || regions.find(r => r.name === region) || regions[0];
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(active.coord)}`;
      if (!open) return null;
      return (
        <div className="loc-back" onClick={onClose}>
          <div className="loc-sheet" onClick={e => e.stopPropagation()}>
            <div className="notif-grab"/>
            <div className="notif-head">
              <div>
                <div className="notif-eyebrow">Lokasi Sawah</div>
                <div className="notif-title">Pilih Wilayah</div>
              </div>
              <button className="notif-close" onClick={onClose} aria-label="Tutup">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
              </button>
            </div>

            <div className={"loc-map-card " + (tweaks.mapsOffline ? "is-offline" : "")}>
              <div className="loc-map-grid">
                <span/><span/><span/><span/><span/><span/>
              </div>
              {filtered.slice(0, 4).map(r => (
                <span key={r.name} className="loc-mini-pin" style={{left: `${r.map[0]}%`, top: `${r.map[1]}%`}}/>

    /* ===== CAROUSEL ===== */
    function Carousel({ onPick, activeMangsa }) {
      const ref = React.useRef(null);
      const active = Math.max(1, Math.min(12, Number(activeMangsa) || ACTIVE));
      const [idx, setIdx] = useState(active - 1);

      React.useEffect(() => {
        // center the active card on mount
        const el = ref.current;
        if (!el) return;
        const card = el.children[active - 1];
        if (card) {
          const off = card.offsetLeft - (el.clientWidth/2 - card.clientWidth/2);
          el.scrollTo({ left: off, behavior: "smooth" });
          setIdx(active - 1);
        }
      }, [active]);

      const onScroll = () => {
        const el = ref.current;
        if (!el) return;
        const center = el.scrollLeft + el.clientWidth/2;
        let best = 0, bestD = Infinity;
        for (let i = 0; i < el.children.length; i++) {
          const c = el.children[i];
          const cx = c.offsetLeft + c.clientWidth/2;
          const d = Math.abs(cx - center);
          if (d < bestD) { bestD = d; best = i; }
        }
        setIdx(best);
      };

      const scrollTo = (i) => {
        const el = ref.current; if (!el) return;
        const card = el.children[i]; if (!card) return;
        const off = card.offsetLeft - (el.clientWidth/2 - card.clientWidth/2);
        el.scrollTo({ left: off, behavior: "smooth" });
      };

      return (
        <div className="carousel-wrap">
          <div className="carousel" ref={ref} onScroll={onScroll}>
            {MANGSA.map(m => (
              <button key={m.n} className={"cc " + (m.n === active ? "cc-active" : "")} style={m.n === active ? {"--m-a": MANGSA_THEME[m.n].a, "--m-b": MANGSA_THEME[m.n].b, "--m-c": MANGSA_THEME[m.n].c} : {}} onClick={() => onPick(m)}>
                {m.n === active && <div className="cc-now"><span className="ndot"/>SEDANG INI</div>}
                <div className="cc-top">
                  <div className="cc-num">{ROMAN[m.n - 1]}</div>
                  <div className="cc-musim">{m.musim}</div>
                </div>
                <div className="cc-name">{m.name}</div>
                <div className="cc-spark"><Sparkline data={SPARKS[m.n]} isActive={m.n === active}/></div>
                <div className="cc-dates">
                  <div className="cc-d cc-d-trad"><span className="cc-d-dot"/>{m.tradisional}</div>
                  <div className="cc-d cc-d-ada"><span className="cc-d-dot"/>{m.adaptif}</div>
                </div>
                <div className="cc-shift"><ArrL/><span>{m.geser > 0 ? "+" : ""}{m.geser} hari</span></div>
                <div className="cc-tap">Ketuk untuk detail -></div>
              </button>
            ))}
          </div>
          <div className="carousel-dots">
            {MANGSA.map((m, i) => (
              <button key={m.n}
                className={"cdot " + (i === idx ? "is-on" : "") + (m.n === active ? " is-active" : "")}
                onClick={() => scrollTo(i)} aria-label={`Mangsa ${m.n}`}/>
            ))}
          </div>
          <div className="carousel-counter">
            <span className="cc-i">{idx + 1}</span><span className="cc-sep">/</span><span>12</span>
            <span className="cc-name-mini">- {MANGSA[idx].name}</span>
          </div>
        </div>
      );
    }

    function useReveal() {
      const ref = React.useRef(null);
      const [shown, setShown] = React.useState(false);
      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        el.ownerDocument.body.classList.add("reveal-ready");
        if (!("IntersectionObserver" in window)) {
          setShown(true);
          return;
        }
        const scroller = el.closest('.almanac-scroll') || el.parentElement;
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              setShown(true);
              io.disconnect();
            }
          });
        }, { root: scroller, threshold: 0.16, rootMargin: '0px 0px -28px 0px' });
        io.observe(el);
        return () => io.disconnect();
      }, []);
      return { ref, className: "soft-reveal " + (shown ? "soft-reveal-in" : "") };
    }
    function Reveal({ children, delay = 0 }) {
      const { ref, className } = useReveal();
      return <div ref={ref} className={className} style={{transitionDelay: `${delay}ms`}}>{children}</div>;
    }

      React.useEffect(() => {
        const tanda = {};
        MANGSA.forEach(m => { tanda[m.n] = m.tanda; });
        fetch(`${API_BASE}/calendar?year=${new Date().getFullYear()}&region=kebumen`)
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(data => {
            const mapped = data.all_mangsa.map(m => ({
              n: m.number, name: m.name,
              tradisional: `${_fd(m.traditional_start)} - ${_fd(m.traditional_end)}`,
              adaptif: `${_fd(m.adaptive_start)} - ${_fd(m.adaptive_end)}`,

            MANGSA.length = 0;
            MANGSA.push(...mapped);
            setActiveMangsaUi(data.current_mangsa.number);
            // derive planting windows for all crops from predicted onset
            const onset = new Date(data.predicted_onset.date);
            const today = new Date();
            function _win(a, b) {
              const s = new Date(onset); s.setDate(s.getDate() + a);
              const e = new Date(onset); e.setDate(e.getDate() + b);
              const ds = s.toISOString().split("T")[0];
              const de = e.toISOString().split("T")[0];
              return { window: `${_fd(ds)} - ${_fd(de)}`, days: Math.max(0, Math.round((s - today) / 86400000)) };

            _notifPadi    = { ..._win(7,  21), note: "Siapkan persemaian dan cek air irigasi." };
